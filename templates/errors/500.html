{% extends "base.html" %}
{% block title %}500 Server Error{% endblock %}
{% block content %}
<div class="empty-state" style="min-height:60vh">
  <div class="empty-icon text-danger"><i class="fas fa-exclamation-triangle"></i></div>
  <h2>Something Went Wrong</h2>
  <p class="text-muted">An internal server error occurred. Please try again.</p>
  {% if error %}<code class="small text-muted">{{ error }}</code>{% endif %}
  <div class="mt-3">
    <a href="{{ url_for('main.index') }}" class="btn btn-primary">
      <i class="fas fa-home me-2"></i>Go Home
    </a>
  </div>
</div>
{% endblock %}
